<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Store Page</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f1e3;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Layout styling */
        .custom-navbar {
            background-color: #869d9dac;
            padding: 15px 0;
            box-shadow: 0 4px 12px rgba(7, 112, 141, 0.1);
        }

        .navbar-brand,
        .nav-link {
            color: #ffffff !important;
            font-weight: bold;
        }

        .nav-link:hover {
            color: #ff6b81 !important;
        }

        /* Main Content Container Grid positioning */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
        }

        /* Custom Main Wrapper Carousel Styles */
        .main-carousel-wrapper {
            width: 100%;
            max-width: 500px;
            /* Gives the single card an elegant centered look */
            padding: 0 50px;
            /* Spacing for controls */
            position: relative;
        }

        /* Retained & Optimized Product Card Styling */
        .product-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 360px;
            margin: 15px auto;
            /* Centers the active card cleanly */
            text-align: center;
            padding: 20px;
            transition: transform 0.3s ease;
            border: none;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* Single Image Frame Setup */
        .image-container {
            border-radius: 12px;
            overflow: hidden;
            height: 220px;
        }

        .image-container img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .product-details h2 {
            color: #2f3542;
            margin: 15px 0 5px 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .price {
            color: hsl(350, 94%, 50%);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-custom {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn-custom:active {
            transform: scale(0.98);
        }

        .btn-cart {
            background-color: #f1f2f6;
            color: #2f3542;
            border: 2px solid #ced6e0;
        }

        .btn-cart:hover {
            background-color: #e4e7eb;
        }

        .btn-buy {
            background-color: #ff6b81;
            color: white;
        }

        .btn-buy:hover {
            background-color: #ff4757;
        }

        /* Custom Outer Indicators and Controls Styles */
        .carousel-control-prev,
        .carousel-control-next {
            width: 40px;
            height: 40px;
            background-color: #2f3542;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .carousel-control-prev:hover,
        .carousel-control-next:hover {
            opacity: 1;
            background-color: #ff6b81;
        }

        .carousel-control-prev {
            left: -10px;
        }

        .carousel-control-next {
            right: -10px;
        }

        .carousel-indicators {
            bottom: -45px;
        }

        .carousel-indicators [data-bs-target] {
            background-color: #2f3542;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .carousel-indicators .active {
            background-color: #ff6b81;
        }

        /* Footer configuration from your diagram */
        .custom-footer {
            background-color: #2f3542;
            color: #a4b0be;
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
            border-top: 4px solid #ff6b81;
        }

        .footer-social {
            border-top: 1px solid #454d5d;
            padding-top: 10px;
            margin-top: 10px;
        }

        .footer-social p {
            font-size: 0.9rem;
            color: #a4b0be;
            margin-bottom: 8px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            color: #a4b0be;
            font-size: 1.4rem;
            transition: color 0.2s ease;
            text-decoration: none;
        }

        .social-icons a.fb:hover {
            color: #1877f2;
        }

        .social-icons a.ig:hover {
            color: #e1306c;
        }

        .social-icons a.tw:hover {
            color: #1da1f2;
        }
    </style>
</head>

<body>

    <!-- ==================== NAVBAR ==================== -->
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
            <a class="navbar-brand" href="#"><i
                    class="fa-solid fa-bag-shopping text-success me-2"></i>Your-Choice-Shoes</a>
            <div class="ms-auto">
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact us</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ==================== MAIN SINGLE CAROUSEL DISPLAY ==================== -->
    <main class="main-content">
        <div class="container d-flex justify-content-center">

            <!-- One Single Global Carousel Element -->
            <div id="mainProductCarousel" class="carousel slide main-carousel-wrapper" data-bs-ride="carousel">

                <!-- Slide Location Indicators -->
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#mainProductCarousel" data-bs-slide-to="0" class="active"
                        aria-current="true" aria-label="Slide 1"></button>
                    <button type="button" data-bs-target="#mainProductCarousel" data-bs-slide-to="1"
                        aria-label="Slide 2"></button>
                    <button type="button" data-bs-target="#mainProductCarousel" data-bs-slide-to="2"
                        aria-label="Slide 3"></button>
                </div>

                <div class="carousel-inner">

                    <!-- CONTAINER SLIDE 1 -->
                    <div class="carousel-item active">
                        <div class="card product-card">
                            <div class="image-container">
                                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500&q=80"
                                    alt="Red Nike Shoes">
                            </div>
                            <div class="product-details">
                                <h2>Premium Nike Air</h2>
                                <div class="price">Rs.2499.99</div>
                            </div>
                            <div class="button-group">
                                <button class="btn-custom btn-cart" onclick="alert('Added to Cart!')">
                                    <i class="fa-solid fa-cart-shopping"></i> Cart
                                </button>
                                <button class="btn-custom btn-buy" onclick="alert('Proceeding to checkout')">Buy
                                    Now</button>
                            </div>
                        </div>
                    </div>

                    <!-- CONTAINER SLIDE 2 -->
                    <div class="carousel-item">
                        <div class="card product-card">
                            <div class="image-container">
                                <img src="https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=500&q=80"
                                    alt="Fashion Sneaker">
                            </div>
                            <div class="product-details">
                                <h2>Streetwear Classics</h2>
                                <div class="price">Rs.2999.99</div>
                            </div>
                            <div class="button-group">
                                <button class="btn-custom btn-cart" onclick="alert('Added to Cart!')">
                                    <i class="fa-solid fa-cart-shopping"></i> Cart
                                </button>
                                <button class="btn-custom btn-buy" onclick="alert('Proceeding to checkout')">Buy
                                    Now</button>
                            </div>
                        </div>
                    </div>

                    <!-- CONTAINER SLIDE 3 -->
                    <div class="carousel-item">
                        <div class="card product-card">
                            <div class="image-container">
                                <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=500&q=80"
                                    alt="Puma Running Shoes">
                            </div>
                            <div class="product-details">
                                <h2>Pro Athlete Runners</h2>
                                <div class="price">Rs.3499.99</div>
                            </div>
                            <div class="button-group">
                                <button class="btn-custom btn-cart" onclick="alert('Added to Cart!')">
                                    <i class="fa-solid fa-cart-shopping"></i> Cart
                                </button>
                                <button class="btn-custom btn-buy" onclick="alert('Proceeding to checkout')">Buy
                                    Now</button>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Global Left/Right Navigation Switches -->
                <button class="carousel-control-prev" type="button" data-bs-target="#mainProductCarousel"
                    data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#mainProductCarousel"
                    data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
            </div>

        </div>
    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer class="custom-footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 <strong class="text-white">Sameer Tiwari</strong>. All Rights Reserved.</p>
        </div>
        <div class="footer-social">
            <p>Follow us for updates</p>
            <div class="social-icons">
                <a href="#" class="fb"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" class="ig"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="tw"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5.3 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
