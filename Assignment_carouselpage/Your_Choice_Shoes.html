<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Store Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f1e3;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar Layout styling */
        .custom-navbar {
            background-color: #869d9dac;
            padding: 15px 0;
            box-shadow: 0 4px 12px rgba(7, 112, 141, 0.1);
        }

        .navbar-brand,
        .nav-link {
            color: #ffffff !important;
            font-weight: bold;
        }

        .nav-link:hover {
            color: #ff6b81 !important;
        }

        /* Main Content Container Grid positioning */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        /* Retained & Optimized Product Card Styling */
        .product-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            /* Adapts flawlessly to the Bootstrap Grid column */
            max-width: 360px;
            margin: 0 auto;
            text-align: center;
            padding: 20px;
            transition: transform 0.3s ease;
            border: none;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* Micro Carousel Inner Setup */
        .image-container-carousel {
            border-radius: 12px;
            overflow: hidden;
            height: 220px;
        }

        .image-container-carousel img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .product-details h2 {
            color: #2f3542;
            margin: 15px 0 5px 0;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .price {
            color: hsl(350, 94%, 50%);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn-custom {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn-custom:active {
            transform: scale(0.98);
        }

        .btn-cart {
            background-color: #f1f2f6;
            color: #2f3542;
            border: 2px solid #ced6e0;
        }

        .btn-cart:hover {
            background-color: #e4e7eb;
        }

        .btn-buy {
            background-color: #ff6b81;
            color: white;
        }

        .btn-buy:hover {
            background-color: #ff4757;
        }

        .social-links {
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .social-links p {
            font-size: 0.9rem;
            color: #747d8c;
            margin-bottom: 10px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            color: #a4b0be;
            font-size: 1.4rem;
            transition: color 0.2s ease;
            text-decoration: none;
        }

        .social-icons a.fb:hover {
            color: #1877f2;
        }

        .social-icons a.ig:hover {
            color: #e1306c;
        }

        .social-icons a.tw:hover {
            color: #1da1f2;
        }

        /* Footer configuration from your diagram */
        .custom-footer {
            background-color: #2f3542;
            color: #a4b0be;
            text-align: center;
            padding: 20px 0;
            margin-top: auto;
            border-top: 4px solid #ff6b81;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
            <a class="navbar-brand" href="#"><i
                    class="fa-solid fa-bag-shopping text-success me-2"></i>Your-Choice-Shoes</a>
            <div class="ms-auto">
                <ul class="navbar-nav flex-row gap-3">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact us</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Signup</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="row g-4 justify-content-center">

                <div class="col-12 col-md-4">
                    <div class="card product-card">
                        <div id="carouselProduct1" class="carousel slide image-container-carousel"
                            data-bs-ride="carousel">
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="../images/premium.jpeg" width="310px" height="200px" alt="Nike Shoes">
                                </div>

                            </div>

                        </div>

                        <div class="product-details">
                            <h2>Premium Nike Air</h2>
                            <div class="price">Rs.2499.99</div>
                        </div>
                        <div class="button-group">
                            <button class="btn-custom btn-cart" onclick="alert('Added to Cart!')">
                                <i class="fa-solid fa-cart-shopping"></i> Cart
                            </button>
                            <button class="btn-custom btn-buy" onclick="alert('Proceeding to checkout')">Buy
                                Now</button>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="card product-card">
                        <div id="carouselProduct2" class="carousel slide image-container-carousel"
                            data-bs-ride="carousel">
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="../images/classic.jpeg" alt="Fashion Sneaker">
                                </div>
                            </div>
                        </div>

                        <div class="product-details">
                            <h2>Streetwear Classics</h2>
                            <div class="price">Rs.2999.99</div>
                        </div>
                        <div class="button-group">
                            <button class="btn-custom btn-cart" onclick="alert('Added to Cart!')">
                                <i class="fa-solid fa-cart-shopping"></i> Cart
                            </button>
                            <button class="btn-custom btn-buy" onclick="alert('Proceeding to checkout')">Buy
                                Now</button>
                        </div>

                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="card product-card">
                        <div id="carouselProduct3" class="carousel slide image-container-carousel"
                            data-bs-ride="carousel">
                            <div class="carousel-inner">
                                <div class="carousel-item active">
                                    <img src="../images/runner.jpeg" alt="Running Shoes">
                                </div>

                            </div>

                        </div>

                        <div class="product-details">
                            <h2>Pro Athlete Runners</h2>
                            <div class="price">Rs.3499.99</div>
                        </div>
                        <div class="button-group">
                            <button class="btn-custom btn-cart" onclick="alert('Added to Cart!')">
                                <i class="fa-solid fa-cart-shopping"></i> Cart
                            </button>
                            <button class="btn-custom btn-buy" onclick="alert('Proceeding to checkout')">Buy
                                Now</button>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="custom-footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 <strong class="text-white">Sameer_Tiwari</strong>All Rights Reserved.</p>

            <div class="social-links">
                <p>Follow us for updates</p>
                <div class="social-icons">
                    <a href="#" class="fb"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#" class="ig"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="tw"><i class="fa-brands fa-twitter"></i></a>
                </div>
            </div>
        </div>
        </div>
    </footer>


</body>

</html>
