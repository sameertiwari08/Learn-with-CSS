<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f1e3;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .product-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 350px;
            text-align: center;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            object-fit: cover;
        }

        .product-details h2 {
            color: #2f3542;
            margin: 15px 0 5px 0;
            font-size: 1.5rem;
        }

        .price {
            color: hsl(350, 94%, 50%);
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-cart {
            background-color: #f1f2f6;
            color: #2f3542;
            border: 2px solid #ced6e0;
            ;
        }

        .btn-cart:hover {
            background-color: #e4e7eb;
        }

        .btn-buy {
            background-color: #ff6b81;


            color: white;
        }

        .btn-buy:hover {
            background-color: #ff4757;
        }

        .social-links {
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .social-links p {
            font-size: 0.9rem;
            color: #747d8c;
            margin-bottom: 10px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icons a {
            color: #a4b0be;
            font-size: 1.4rem;
            transition: color 0.2s ease;
            text-decoration: none;
        }

        /* Brand Colors on Hover */
        .social-icons a.fb:hover {
            color: #1877f2;
        }

        .social-icons a.ig:hover {
            color: #e1306c;
        }

        .social-icons a.tw:hover {
            color: #1da1f2;
        }
    </style>
</head>

<body>
    <div class="product-card">
        <div class="image-container">
            <img src="../images/shoes.jpeg" width="310px" height="200px" alt="product Image">
        </div>
        <div class="product-details">
            <h2>Premium Nike shoes</h2>
            <div class="price">Rs.2499.99</div>
        </div>
        <div class="button-group">
            <button class="btn btn-cart" onclick="alert('Added to Cart!')">
                <i class="fa-solid fa-cart-shopping"></i> Cart
            </button>
            <button class=" btn btn-buy" onclick="alert('Proceeding to checkout')">Buy Now</button>
        </div>
        <div class="social-links">
            <p>Follow us for updates</p>
            <div class="social-icons">
                <a href="#" target="_blank" class="fb" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
                <a href="#" target="_blank" class="ig" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" target="_blank" class="tw" title="Twitter/X"><i class="fa-brands fa-twitter"></i></a>
            </div>
        </div>
    </div>

</body>

</html>
